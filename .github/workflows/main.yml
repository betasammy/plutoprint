name: Build and Upload to PyPI

on: [push, pull_request]

jobs:
  build_sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build sdist
        run: |
          python -m pip install -U pip build
          python -m build --sdist -Csetup-args=-Dsdist=true

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: ./dist/*.tar.gz
          
  build_macos_wheels:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install llvm pkg-config \
            meson ninja \
            cairo expat fontconfig freetype harfbuzz icu4c \
            curl jpeg-turbo webp

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.3
        env:
          # Only ARM64 builds
          CIBW_BUILD: |
            cp310-macosx_arm64
            cp311-macosx_arm64
            cp312-macosx_arm64
            cp313-macosx_arm64
            cp314-macosx_arm64
          # Install delocate before build
          CIBW_BEFORE_BUILD_MACOS: pip install delocate
          # Repair each built wheel
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            delocate-wheel -v -w {dest_dir} {wheel}
          # Simple runtime test
          CIBW_TEST_COMMAND: >
            python -c "import plutoprint; print(plutoprint.__build_info__)"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: cibw-macos-arm64-wheels
          path: ./wheelhouse/*.whl
          
  upload_pypi:
    needs: [build_sdist, build_macos_wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cibw-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
